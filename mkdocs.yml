site_name: 'AI in a Day'
site_description: "Website for ESIIL 'AI in a Day' working group"
site_author: "'AI in a Day' Working Group"
site_url: https://cu-esiil.github.io/AI-in-a-day

# Repository
repo_name: AI-in-a-day
repo_url: https://github.com/CU-ESIIL/AI-in-a-day
# The edit URI points MkDocs Material at the docs/ source so page edit links open in GitHub edit mode.
edit_uri: edit/main/docs/
# Copyright
copyright: 'Copyright &copy; 2026 University of Colorado Boulder'

# Page tree
nav:
  - Home: index.md
  - Survey: survey.md
  - Team: team.md

# Configuration
theme:
  highlightjs: true
  name: material
  font: false
  logo: 'assets/esiil_content/ESIIL_logo.png'
  favicon: 'assets/esiil_content/favicon.ico'
  features:
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - toc.follow
    - content.action.edit
    - content.code.copy
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: 'white'
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference

# Options
extra:
  social:
    - icon: fontawesome/brands/github

extra_css:
  - stylesheets/tokens.css
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - pymdownx.snippets:
      base_path:
        - docs

validation:
  omitted_files: ignore

plugins:
    - search
